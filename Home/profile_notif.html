<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pengaturan Notifikasi — TemuTrip</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="Home.css">

  <style>
    body {
      animation: fadeIn 0.4s ease-in-out forwards;
      background-color: #f8f9fa;
    }

    .fade-out {
      animation: fadeOut 0.4s ease-in-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    .back-btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #1a1a1a;
      font-weight: 600;
      font-size: 1.1rem;
      padding: 10px 0;
      transition: transform 0.2s ease, color 0.2s ease;
      cursor: pointer;
    }

    .back-btn-nav:hover {
      color: #2F5C4B;
      transform: translateX(-5px);
    }

    .feature-container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    .feature-header {
      margin-bottom: 30px;
      border-bottom: 1px solid #eee;
      padding-bottom: 15px;
    }

    .feature-header h2 {
      font-family: 'Playfair Display', serif;
      color: #2F5C4B;
    }

    .notif-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid #fafafa;
    }

    .notif-info h4 {
      margin: 0 0 5px 0;
      color: #333;
    }

    .notif-info p {
      margin: 0;
      font-size: 0.85rem;
      color: #777;
    }

    /* Switch toggle styling */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: #2F5C4B;
    }

    input:checked+.slider:before {
      transform: translateX(20px);
    }

    /* Penyelaras jenis font kotak pop-up ke DM Sans */
    .swal2-custom-font {
      font-family: 'DM Sans', sans-serif !important;
      border-radius: 16px !important;
    }
  </style>
</head>

<body>

  <nav class="navbar" id="navbar">
    <div class="container nav-container" style="justify-content: flex-start;">
      <a onclick="smoothNavigateUrl(event, 'profile.html')" class="back-btn-nav">
        <i class="ph-bold ph-arrow-left" style="font-size: 1.4rem;"></i> Kembali ke Profile
      </a>
    </div>
  </nav>

  <main class="container">
    <div class="feature-container">
      <div class="feature-header">
        <h2>Notifikasi</h2>
        <p>Atur bagaimana kamu ingin menerima pemberitahuan seputar petualanganmu.</p>
      </div>

      <div class="notif-row">
        <div class="notif-info">
          <h4>Notifikasi Rekomendasi Wisata</h4>
          <p>Dapatkan rekomendasi destinasi seru mingguan berdasarkan minatmu.</p>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggleWisata" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="notif-row">
        <div class="notif-info">
          <h4>Aktivitas Akun</h4>
          <p>Pemberitahuan keamanan saat ada login baru atau perubahan kata sandi.</p>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggleAkun" checked>
          <span class="slider"></span>
        </label>
      </div>

      <button type="button" onclick="saveNotificationSettings()"
        style="background: #2F5C4B; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 30px; width: 100%;">Simpan
        Pengaturan</button>
    </div>
  </main>

  <script src="Home.js"></script>
  <script>
    function smoothNavigateUrl(event, url) {
      event.preventDefault();
      document.body.classList.add('fade-out');
      setTimeout(() => { window.location.href = url; }, 350);
    }
  </script>
</body>

</html>
