<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Informasi Pribadi — TemuTrip</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="Home.css">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="Home.js" defer></script>

  <style>
    /* Efek Transisi Masuk Halaman */
    body {
      animation: fadeIn 0.4s ease-in-out forwards;
      background-color: #f8f9fa;
    }

    .fade-out {
      animation: fadeOut 0.4s ease-in-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    /* Styling Tombol Kembali */
    .back-btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #1a1a1a;
      font-weight: 600;
      font-size: 1.1rem;
      padding: 10px 0;
      transition: transform 0.2s ease, color 0.2s ease;
      cursor: pointer;
    }

    .back-btn-nav:hover {
      color: #2F5C4B;
      transform: translateX(-5px);
    }

    /* Pembungkus Form */
    .feature-container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    .feature-header {
      margin-bottom: 30px;
      border-bottom: 1px solid #eee;
      padding-bottom: 15px;
    }

    .feature-header h2 {
      font-family: 'Playfair Display', serif;
      color: #2F5C4B;
    }

    /* Input Styling */
    .form-group {
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
      font-size: 0.95rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #2F5C4B;
      outline: none;
    }

    .form-group input:disabled {
      background: #f0f0f0;
      color: #777;
      cursor: not-allowed;
    }

    /* Tombol Simpan */
    .save-btn-profile {
      background: #2F5C4B;
      color: white;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .save-btn-profile:hover {
      background: #1e3d32;
    }

    /* Custom font pop-up agar membulat rapi senada dengan font web lo */
    .swal2-custom-font {
      font-family: 'DM Sans', sans-serif !important;
      border-radius: 16px !important;
    }
  </style>
</head>

<body>

  <nav class="navbar" id="navbar">
    <div class="container nav-container" style="justify-content: flex-start;">
      <a onclick="smoothNavigateUrl(event, 'profile.html')" class="back-btn-nav">
        <i class="ph-bold ph-arrow-left" style="font-size: 1.4rem;"></i> Kembali ke Profil
      </a>
    </div>
  </nav>

  <main class="container">
    <div class="feature-container">
      <div class="feature-header">
        <h2>Informasi Pribadi</h2>
        <p>Atur data diri kamu agar pengalaman jelajah destinasi makin personal.</p>
      </div>

      <form onsubmit="saveProfileChanges(event)">
        <div class="form-group">
          <label><i class="ph ph-user"></i> Nama Lengkap</label>
          <input type="text" id="profileName" value="Kamu (Traveler)" required />
        </div>

        <div class="form-group">
          <label><i class="ph ph-envelope"></i> Alamat Email</label>
          <input type="email" id="profileEmail" value="541251057@student.smktelkom-pwt.sch.id" required />
          <small style="color: #888; display: block; margin-top: 4px;">Pastikan email aktif untuk menerima informasi
            perjalanan.</small>
        </div>

        <div class="form-group">
          <label><i class="ph ph-phone"></i> Nomor Telepon</label>
          <input type="tel" id="profilePhone" placeholder="Contoh: 081234567890" value="081234567890" required />
        </div>

        <div class="form-group">
          <label><i class="ph ph-gender-intersex"></i> Jenis Kelamin</label>
          <div style="display: flex; gap: 20px; padding: 10px 0;">
            <label style="font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px;">
              <input type="radio" name="profileGender" value="Laki-laki" id="genderL" checked
                style="width: 18px; height: 18px; cursor: pointer;"> Laki-laki
            </label>
            <label style="font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px;">
              <input type="radio" name="profileGender" value="Perempuan" id="genderP"
                style="width: 18px; height: 18px; cursor: pointer;"> Perempuan
            </label>
          </div>
        </div>

        <div class="form-group">
          <label><i class="ph ph-calendar"></i> Tanggal Lahir</label>
          <input type="date" id="profileBirth" value="2008-01-01" />
        </div>

        <div class="form-group">
          <label><i class="ph ph-map-pin"></i> Kota Domisili</label>
          <input type="text" id="profileCity" placeholder="Contoh: Purwokerto, Banyumas" value="Purwokerto" />
        </div>

        <button type="submit" class="save-btn-profile">Simpan Perubahan</button>
      </form>
    </div>
  </main>

</body>

</html>
