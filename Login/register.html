<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Akun - TemuTrip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="Login.css" />
</head>

<body>

    <div class="container">
        <div class="login-box">

            <div class="header-content">
                <div class="logo">
                    <img src="Gambar/temutrip_logo.svg" alt="Logo" class="logo-icon">
                    <span class="logo-text">TemuTrip</span>
                </div>
                <h1>Gabung TemuTrip</h1>
                <p class="subtitle">Mulai petualangan barumu bersama kami</p>
            </div>

            <form action="register.php" method="POST" class="form-container" id="signupForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" id="username" class="input-field"
                        placeholder="Pilih username unik" required />
                </div>
                <div class="form-group">
                    <label>Alamat Email</label>
                    <input type="email" name="email" id="email" class="input-field" placeholder="namaanda@gmail.com"
                        required pattern="[a-zA-Z0-9._%+\-]+@gmail\.com"
                        title="Harap gunakan alamat email yang berakhiran @gmail.com" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" class="input-field"
                            placeholder="Minimal 8 karakter (kombinasi)" required />
                        <button type="button" class="toggle-pw" onclick="togglePassword(this)" tabindex="-1">
                            <img src="https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/eye.svg"
                                class="eye-icon" />
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <div class="input-wrapper">
                        <input type="password" name="konfirmasi_password" class="input-field"
                            placeholder="Ulangi password" required />
                        <button type="button" class="toggle-pw" onclick="togglePassword(this)" tabindex="-1">
                            <img src="https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/eye.svg"
                                class="eye-icon" />
                        </button>
                    </div>
                </div>
                <button type="submit" name="register" class="btn-primary">Daftar Sekarang</button>
            </form>

            <div class="auth-footer" style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #64748b;">
                Sudah punya akun? <a href="Login.html"
                    style="color: #34715c; font-weight: 700; text-decoration: none;">Sign In di sini</a>
            </div>

        </div>
    </div>

    <script src="register.js"></script>
</body>

</html>
