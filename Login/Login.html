<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TemuTrip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="Login.css" />
</head>

<body>

  <div class="container">
    <div class="login-box">

      <div class="header-content">
        <div class="logo">
          <img src="Gambar/temutrip_logo.svg" alt="Logo" class="logo-icon">
          <span class="logo-text">TemuTrip</span>
        </div>
        <h1>Selamat Datang</h1>
        <p class="subtitle">Masuk untuk melanjutkan petualanganmu</p>
      </div>

      <form action="login.php" method="POST" class="form-container" id="signin">
        <div class="form-group">
          <label>Username atau Email</label>
          <input type="text" name="user_id" class="input-field" placeholder="Masukkan username atau email" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <input type="password" name="password" class="input-field" placeholder="Masukkan password" required />
            <button type="button" class="toggle-pw" onclick="togglePassword(this)" tabindex="-1">
              <img src="https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/eye.svg" class="eye-icon" />
            </button>
          </div>
        </div>
        <button type="submit" name="login" class="btn-primary">Sign In</button>
      </form>

      <div class="auth-footer" style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #64748b;">
        Belum punya akun? <a href="register.html" style="color: #34715c; font-weight: 700; text-decoration: none;">Sign
          Up di sini</a>
      </div>

    </div>
  </div>

  <script>
    function togglePassword(btn) {
      const input = btn.closest('.input-wrapper').querySelector('input');
      const icon = btn.querySelector('.eye-icon');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      icon.src = isHidden
        ? 'https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/eye-off.svg'
        : 'https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/eye.svg';
    }
  </script>
</body>

</html>
